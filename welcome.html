  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" defer></script>
  <script>
    window.addEventListener('load', () => {
      if (typeof confetti !== 'function') return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      const colors = ['#ea580c', '#fdba74', '#fed7aa', '#fff7ed', '#e63946', '#f59e0b'];
      const duration = 2200;
      const end = Date.now() + duration;

      // Two corner streams continuously launching for the full duration.
      (function frame() {
        confetti({
          particleCount: 4,
          angle: 60,
          spread: 70,
          startVelocity: 55,
          origin: { x: 0, y: 0.85 },
          colors,
        });
        confetti({
          particleCount: 4,
          angle: 120,
          spread: 70,
          startVelocity: 55,
          origin: { x: 1, y: 0.85 },
          colors,
        });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();

      // Three fireworks bursts above the title for the "wow" moment.
      const burst = (x, delay) => setTimeout(() => {
        confetti({
          particleCount: 90,
          spread: 360,
          startVelocity: 32,
          ticks: 120,
          gravity: 0.7,
          scalar: 1.1,
          origin: { x, y: 0.35 },
          colors,
        });
      }, delay);
      burst(0.5, 150);
      burst(0.25, 600);
      burst(0.75, 900);
    });
  </script>
